name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

jobs:
  tests:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Sync dependencies (Python pinned via .python-version)
        run: uv sync --frozen

      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Test
        run: uv run pytest

  # Branch protection requires a check with exactly this name; the matrix
  # legs feed it so the required-check name survives matrix changes.
  lint-and-test:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - run: echo "all matrix legs green"
