name: Release

# Publishes to PyPI via Trusted Publishing (OIDC) — no API tokens anywhere.
# Trigger: push a version tag (v0.1.0). workflow_dispatch allows re-running
# a failed publish for an existing tag.
#
# One-time PyPI setup (see RELEASING.md): add a trusted publisher for
# project "whetkit" with owner benlamlih, repo whetkit, workflow
# release.yml, environment pypi.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Check tag matches pyproject version
        if: github.ref_type == 'tag'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION="$(uv version --short)"
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::tag v$TAG does not match pyproject version $VERSION"
            exit 1
          fi

      - name: Run tests
        run: |
          uv sync --frozen
          uv run pytest

      - name: Build sdist and wheel
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/whetkit/
    permissions:
      id-token: write # OIDC token for PyPI Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: publish-pypi
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release with artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
